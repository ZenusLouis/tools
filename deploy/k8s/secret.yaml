apiVersion: v1
kind: Secret
metadata:
  name: gcs-secrets
  namespace: gcs
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque
stringData:
  DATABASE_URL: "postgresql://gcs:gcs@postgres-svc:5432/gcs"
  POSTGRES_PASSWORD: "gcs"
  ENCRYPTION_KEY: "REPLACE_WITH_OUTPUT_OF: openssl rand -hex 32"
  HOOK_SECRET: "REPLACE_WITH_OUTPUT_OF: openssl rand -base64 32"
  AUTH_SECRET: "REPLACE_WITH_OUTPUT_OF: openssl rand -base64 64"
  ADMIN_EMAIL: "admin@gcs.local"
  ADMIN_PASSWORD: "REPLACE_WITH_STRONG_ADMIN_PASSWORD"
  BRIDGE_TOKEN: "REPLACE_WITH_OPTIONAL_BRIDGE_TOKEN"
