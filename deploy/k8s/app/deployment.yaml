apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcs-dashboard
  namespace: gcs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gcs-dashboard
  template:
    metadata:
      labels:
        app: gcs-dashboard
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/zenuslouis/gcs-dashboard:latest
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gcs-secrets
                  key: DATABASE_URL
      containers:
        - name: gcs-dashboard
          image: ghcr.io/zenuslouis/gcs-dashboard:latest  # updated by Jenkins
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gcs-secrets
                  key: DATABASE_URL
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: gcs-config
                  key: NODE_ENV
            - name: CLAUDE_ROOT
              valueFrom:
                configMapKeyRef:
                  name: gcs-config
                  key: CLAUDE_ROOT
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: gcs-secrets
                  key: ENCRYPTION_KEY
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
