apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcs-dashboard
  namespace: gcs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gcs-dashboard
  template:
    metadata:
      labels:
        app: gcs-dashboard
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: migrate
          image: ghcr.io/zenuslouis/gcs-dashboard:latest
          command: ["npx", "--yes", "prisma@6", "db", "push", "--accept-data-loss"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gcs-secrets
                  key: DATABASE_URL
      containers:
        - name: gcs-dashboard
          image: ghcr.io/zenuslouis/gcs-dashboard:latest  # updated by Jenkins
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gcs-secrets
                  key: DATABASE_URL
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: gcs-secrets
                  key: AUTH_SECRET
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: gcs-secrets
                  key: ADMIN_EMAIL
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gcs-secrets
                  key: ADMIN_PASSWORD
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: gcs-config
                  key: NODE_ENV
            - name: CLAUDE_ROOT
              valueFrom:
                configMapKeyRef:
                  name: gcs-config
                  key: CLAUDE_ROOT
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: gcs-secrets
                  key: ENCRYPTION_KEY
            - name: NEXT_PUBLIC_APP_URL
              valueFrom:
                configMapKeyRef:
                  name: gcs-config
                  key: NEXT_PUBLIC_APP_URL
            - name: HOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: gcs-secrets
                  key: HOOK_SECRET
            - name: BRIDGE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gcs-secrets
                  key: BRIDGE_TOKEN
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
