services:
  app:
    build:
      context: .
      target: builder
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://gcs:gcs@postgres:5432/gcs
      CLAUDE_ROOT: /data
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - gcs_data:/data
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: gcs
      POSTGRES_PASSWORD: gcs
      POSTGRES_DB: gcs
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gcs -d gcs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  gcs_data:
