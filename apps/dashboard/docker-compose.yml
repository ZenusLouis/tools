services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://gcs:gcs@postgres:5432/gcs
      CLAUDE_ROOT: /data
      NODE_ENV: production
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    volumes:
      - gcs_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: gcs
      POSTGRES_PASSWORD: gcs
      POSTGRES_DB: gcs
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gcs -d gcs"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  gcs_data:
